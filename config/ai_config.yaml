# AI Adapter Configuration
# SECURITY WARNING: DO NOT COMMIT API KEYS IN THIS FILE.
# All API credentials must be passed via environment variables (e.g. OPENAI_API_KEY).

default_mode: "OFFLINE_FALLBACK"   # Options: OFFLINE_FALLBACK, LLM_ADAPTER

fallback_engine:
  template_dir: "templates/prompts"
  use_jinja2: true

llm_adapter:
  provider: "openai-compatible"     # Pluggable provider interface
  model_name: "gpt-4o-mini"
  temperature: 0.2
  max_tokens: 1000
  timeout_seconds: 30

validation_settings:
  enable_factual_checks: true
  reject_on_factual_discrepancy: true
  min_confidence_score: "MEDIUM"
