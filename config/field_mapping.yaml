  "Priority": "priority"
  "Custom field (RAG)": "rag_status"
  "Custom field (Confidence)": "confidence_level"
  "Created": "start_date"
  "Custom field (Target End Date)": "target_end_date"
  "Updated": "last_update_date"
  "Custom field (Progress Pct)": "progress_pct"
  "Custom field (Approved Budget)": "budget"
  "Custom field (Actual Spend)": "actual_cost"
  "Custom field (Forecast Cost)": "forecast_cost"
  "Custom field (Expected Benefit)": "expected_benefit"
  "Custom field (Benefits Status)": "benefits_status"
